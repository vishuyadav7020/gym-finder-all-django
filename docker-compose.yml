version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: gym-finder-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: HeroHonda@211202
      MONGO_INITDB_DATABASE: gym_finder_management_db
    ports:
      - mongodb:27017
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - gym-finder-network

  # Django Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gym-finder-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_ENV=production
      - DEBUG=false
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    depends_on:
      - mongodb
    networks:
      - gym-finder-network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8080 --workers 3 --timeout 120 project_4_django.wsgi:application"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: gym-finder-nginx
    restart: unless-stopped
    ports:
      - "8082:8082"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    depends_on:
      - backend
    networks:
      - gym-finder-network

volumes:
  mongodb_data:
  mongodb_config:

networks:
  gym-finder-network:
    driver: bridge